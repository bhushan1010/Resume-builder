services:
  - type: web
    name: resume-rewriter-backend
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: GEMINI_KEY_1
        sync: false
      - key: GEMINI_KEY_2
        sync: false
      - key: GEMINI_KEY_3
        sync: false
      - key: GEMINI_KEY_4
        sync: false
      - key: GEMINI_KEY_5
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./resume_rewriter.db
    disk:
      name: resume-data
      mountPath: /app
      sizeGB: 1