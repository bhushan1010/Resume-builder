<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Register — ATS Pro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; background: #f9f9fa; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-zinc-900">ATS Pro</h1>
            <p class="text-zinc-500 text-sm mt-1">Create your account</p>
        </div>
        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm mb-6">{{ error }}</div>
        {% endif %}
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-600 mb-1" for="name">Full Name</label>
                <input class="w-full border border-zinc-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-zinc-900 focus:border-transparent" id="name" name="name" type="text" required />
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-600 mb-1" for="email">Email</label>
                <input class="w-full border border-zinc-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-zinc-900 focus:border-transparent" id="email" name="email" type="email" required />
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-600 mb-1" for="password">Password (min 6 chars)</label>
                <input class="w-full border border-zinc-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-zinc-900 focus:border-transparent" id="password" name="password" type="password" minlength="6" required />
            </div>
            <button class="w-full bg-zinc-900 text-white py-3 rounded-lg font-semibold hover:bg-zinc-800 transition-colors" type="submit">Create Account</button>
        </form>
        <p class="text-center text-sm text-zinc-500 mt-6">Already have an account? <a class="text-zinc-900 font-semibold hover:underline" href="/login">Sign In</a></p>
        <p class="text-center text-sm text-zinc-400 mt-2"><a href="/" class="hover:text-zinc-600">← Back to home</a></p>
    </div>
</body>
</html>
